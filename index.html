<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Resolve theme before first paint to avoid a light/dark flash. Mirrors ThemeProvider. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('otl.theme');
          var pref = (stored === 'light' || stored === 'dark' || stored === 'system') ? stored : 'dark';
          var isDark = pref === 'dark' || (pref === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
        } catch (e) { document.documentElement.classList.add('dark'); }
      })();
    </script>
    <!-- Favicon: noir-tiled monogram is the safe default (reads on any browser chrome). -->
    <link rel="icon" href="/favicon.png" type="image/png" sizes="180x180" />
    <!-- Dark-scheme browsers that honor the media hint can use the borderless ivory mark. -->
    <link rel="icon" href="/favicon-dark.png" type="image/png" media="(prefers-color-scheme: dark)" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="512x512" />
    <meta name="theme-color" content="#21402C" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#EFE8DA" media="(prefers-color-scheme: light)" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Young+Serif&family=Instrument+Serif:ital@1&family=Archivo:wght@500;700&display=swap" rel="stylesheet">
